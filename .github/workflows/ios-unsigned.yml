name: iOS Unsigned IPA

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show build settings
        run: |
          set -o pipefail
          xcodebuild \
            -project MoviePilot.xcodeproj \
            -target MoviePilot \
            -configuration Release \
            -showBuildSettings | tee build-settings.log

      - name: Build unsigned app
        run: |
          set -o pipefail
          xcodebuild \
            -project MoviePilot.xcodeproj \
            -target MoviePilot \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee xcodebuild.log

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build -path "*Release-iphoneos/*.app" | head -n 1)
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry unsigned.ipa Payload

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: moviepilot-build-logs
          path: |
            build-settings.log
            xcodebuild.log
          if-no-files-found: warn

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: moviepilot-unsigned-ipa
          path: unsigned.ipa
          if-no-files-found: error
